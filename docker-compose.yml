services:

  postgres:
    image: postgres:17

    container_name: slalomjudge-postgres

    environment:
      POSTGRES_DB: slalomjudge
      POSTGRES_USER: slalomjudge
      POSTGRES_PASSWORD: slalomjudge

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  mercure:
    image: dunglas/mercure

    container_name: slalomjudge-mercure

    environment:
      SERVER_NAME: ':80'
      MERCURE_PUBLISHER_JWT_KEY: '!ChangeThisMercureHubJWTSecretKey!'
      MERCURE_SUBSCRIBER_JWT_KEY: '!ChangeThisMercureHubJWTSecretKey!'
      MERCURE_EXTRA_DIRECTIVES: |
        cors_origins *

    ports:
      - "3000:80"

  backend:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    container_name: slalomjudge-backend

    working_dir: /app

    volumes:
      - ./backend:/app

    ports:
      - "8000:8000"

    depends_on:
      - postgres

    command: php -S 0.0.0.0:8000 -t public

  frontend:
    image: node:22

    container_name: slalomjudge-frontend

    working_dir: /app

    volumes:
      - ./frontend:/app

    ports:
      - "5173:5173"

    command: sh -c "npm install && npm run dev -- --host"

volumes:
  postgres_data: